<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clasificación Porra del Mundial 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header2026">
    <img id="logo2026" src="logo2026.png" alt="Logo Mundial 2026">
    <h1 class="titulo2026">Clasificación de la Porra – Mundial 2026</h1>
    <p id="ultimaActualizacion" class="actualizacion"></p>
    <button id="logoutBtn" class="logout">Cerrar sesión</button>
  </header>

  <div id="loginScreen">
    <h2>Identificación</h2>
    <p>Introduce tu nombre y apellidos</p>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="apellidos" placeholder="Apellidos">

    <button id="btnLogin">Entrar</button>

    <p id="loginError" class="error"></p>
  </div>

  <div id="mainContent" style="display:none;">

    <h1>Clasificación Porra del Mundial 2026</h1>
    <div id="adminTools" class="upload-box" style="display:none;">
    </div>
    <div class="tabla-scroll">
      <table id="tabla">
        <thead>
          <tr>
            <th>Posición</th>
            <th>Jugador</th>
            <th>Fase Grupos</th>
            <th>16avos</th>
            <th>Octavos</th>
            <th>Cuartos</th>
            <th>Semis</th>
            <th>Final</th>
            <th>3º y 4º</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    
  </div>
  
  <script src="app.js"></script>
</body>
</html>

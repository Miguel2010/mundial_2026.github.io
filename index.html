<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/webp" href="./fifa-logo-transparent-white.webp" />
    <meta
      name="description"
      content="Clasificación de la porra del Mundial 2026."
    />
    <script>
      (function restoreGitHubPagesRoute(location) {
        if (location.search[1] !== '/') {
          return;
        }

        var restoredPath = location.search
          .slice(1)
          .split('&')
          .map(function restoreQuerySeparator(value) {
            return value.replace(/~and~/g, '&');
          })
          .join('?');

        window.history.replaceState(
          null,
          null,
          location.pathname.slice(0, -1) + restoredPath + location.hash
        );
      })(window.location);
    </script>
    <title>Clasificación Porra del Mundial 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
